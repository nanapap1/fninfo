name: info.yml
on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'services/info-service/**'

jobs:
  Testing:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5.1.0
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: services/info-service/pom.xml

      - name: Install dependecies
        run: mvn clean install -DskipTests -pl tg-bom,common -am

      - name: Test Maven
        working-directory: services/info-service
        run: mvn clean test

