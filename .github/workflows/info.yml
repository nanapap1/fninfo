name: info.yml
on:
  push:
    branches:
      - cd
    paths:
      - 'services/info-service/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'services/info-service/**'

jobs:
  Testing:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v5.1.0
        with:
          distribution: 'temurin'
          java-package: 'jdk'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: services/info-service/pom.xml

      - name: Install tg-bom
        run: mvn clean install

      - name: Install common
        working-directory: common
        run: mvn clean install

      - name: Test Maven
        working-directory: services/info-service
        run: mvn clean test

  Build:
    runs-on: ubuntu-22.04
    needs: Testing
    if: github.ref == 'refs/heads/cd'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/info-service
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/cd' }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/info-service/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

